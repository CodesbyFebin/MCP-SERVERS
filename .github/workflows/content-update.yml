name: Content Update and Validation

on:
  schedule:
    - cron: '0 2 1 * *'   # At 02:00 on day 1 of every month
  workflow_dispatch:

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      # Default to Ollama; can be overridden by setting LLM_PROVIDER repository variable to 'openai'
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'ollama' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Required to push back to the repository

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate content
        run: node scripts/generate-content.mjs
        # The script will use OPENAI_API_KEY if LLM_PROVIDER is 'openai'

      - name: Build Next.js application
        run: npm run build

      - name: Validate JSON-LD schemas
        run: node scripts/validate-schema.mjs

      - name: Commit and push generated content
        if: success()
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.github.com"
          
          # Check if there are changes in the content directory
          if git diff --quiet --exit-code HEAD -- content/; then
            echo "No changes in content directory. Skipping commit."
          else
            echo "Changes detected in content directory. Committing..."
            git add content/
            git commit -m "chore: update content [skip ci]"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          fi
name: Sitemap Health & IndexNow Submission

on:
  schedule:
    - cron: "0 3 * * *"   # Daily at 03:00 UTC
  workflow_dispatch:

jobs:
  sitemap-health-and-indexnow:
    runs-on: ubuntu-latest
    env:
      PRODUCTION_BASE_URL: https://www.mcpserver.in
      INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
      INDEXNOW_HOST: www.mcpserver.in
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Crawl sitemap and verify every URL returns 200
        run: node scripts/verify-sitemap.mjs

      - name: Submit sitemap/IndexNow
        run: node scripts/submit-indexnow.mjs
